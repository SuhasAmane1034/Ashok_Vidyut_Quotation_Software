# Render Blueprint — https://render.com/docs/blueprint-spec
# Connect this repo in Render; it will pick up this file, or create a Web Service manually.

services:
  - type: web
    name: quoteflow-api
    runtime: node
    rootDir: server
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
